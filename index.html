<script>
"use strict";
/* ================= Constantes ================= */

const ATC_CLS = { "INSPECCIONADO": "v", "USO RESTRINGIDO": "a", "NO HABITABLE": "r" };
const ATC_CORTO = { "INSPECCIONADO": "INSPECC.", "USO RESTRINGIDO": "USO RESTR.", "NO HABITABLE": "NO HABITABLE" };
const DANOS = ["Sin daño", "Mampostería menor", "Mampostería mayor", "Daño estructural", "Preexistente no sísmico"];
const SISTEMAS = [

];

  "Columnas visibles","Vigas interiores visibles","Vigas perimetrales exteriores","Escalera principal",
  "Escalera de emergencia","Áreas comunes PB","Sótano / estacionamiento","Acceso al sótano",

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

/* ================= Nube (Supabase) ================= */
const SUPA_URL = "https://tkqqjbuzrulqkzhdiqwq.supabase.co";
const SUPA_KEY = "sb_publishable_j6XrZIg5LwI9Fhp4ZG0jOQ_xdaJw7Qi";
let supa = null;
try { supa = window.supabase ? window.supabase.createClient(SUPA_URL, SUPA_KEY) : null; } catch (e) { supa = null; }
let nube = { sesion: null, estado: "off", msg: "" }; // off | sin-sesion | sync | ok | error
let _subidos = null; // {blobId: true} blobs ya en la nube
async function subidosSet() {
  if (_subidos) return _subidos;
  try { _subidos = JSON.parse((await kvGet("subidos")) || "{}"); } catch (e) { _subidos = {}; }
  return _subidos;
}
async function marcarSubido(id) {
  const s = await subidosSet(); s[id] = true; await kvSet("subidos", JSON.stringify(s));
}
function ponNube(estado, msg) {
  nube.estado = estado; nube.msg = msg || "";
  const el = document.getElementById("hdrNube");
  if (!el) return;
  el.textContent = estado === "ok" ? "☁✓" : estado === "sync" ? "☁…" : estado === "error" ? "☁!" : estado === "sin-sesion" ? "☁ entrar" : "";
  el.title = msg || "";
}
function extBlob(b) { return (b && b.type || "").includes("webm") ? "webm" : (b && b.type || "").includes("mp4") ? "m4a" : "jpg"; }
function rutaNube(tipo, id, blob) {
  const u = nube.sesion.user.id;
  return `${u}/${tipo}_${id}.${tipo === "photo" ? "jpg" : extBlob(blob)}`;
}
async function subirBlob(tipo, id) {
  const s = await subidosSet();
  if (s[tipo + ":" + id]) return true;
  const blob = await blobGet(tipo + ":" + id);
  if (!blob) return true;
  const { error } = await supa.storage.from("archivos").upload(rutaNube(tipo, id, blob), blob, { upsert: true, contentType: blob.type || undefined });
  if (error) throw new Error("subida " + tipo + ": " + error.message);
  await marcarSubido(tipo + ":" + id);
  return true;
}
async function bajarBlob(tipo, id) {
  // intenta las extensiones conocidas
  for (const ext of tipo === "photo" ? ["jpg"] : ["m4a", "webm"]) {
    const ruta = `${nube.sesion.user.id}/${tipo}_${id}.${ext}`;
    const { data, error } = await supa.storage.from("archivos").download(ruta);
    if (!error && data) {
      await blobSet(tipo + ":" + id, data);
      await marcarSubido(tipo + ":" + id);
      return data;
    }
  }
  return null;
}
function blobsDeInsp(d) {
  const ids = [];
  for (const u of Object.values(d.unidades || {})) {
    for (const f of u.fotos || []) ids.push(["photo", f.id]);
    if (u.voz && u.voz.audio) ids.push(["audio", u.voz.audio]);
  }
  for (const nv of d.niveles || []) if (nv.voz && nv.voz.audio) ids.push(["audio", nv.voz.audio]);
  return ids;
}
async function subirInsp(id) {
  const raw = await kvGet("insp:" + id);
  if (!raw) return;
  const d = JSON.parse(raw);
  const ts = d._ts || new Date().toISOString();
  const { error } = await supa.from("inspecciones").upsert({ id, user_id: nube.sesion.user.id, data: d, updated_at: ts });
  if (error) throw new Error("datos: " + error.message);
  for (const [tipo, bid] of blobsDeInsp(d)) await subirBlob(tipo, bid);
}
async function borrarInspNube(id, d) {
  if (!supa || !nube.sesion) return;
  try {
    await supa.from("inspecciones").delete().eq("id", id);
    const rutas = blobsDeInsp(d).map(([t, b]) => {
      // borra ambas posibles extensiones de audio
      return t === "photo" ? [`${nube.sesion.user.id}/photo_${b}.jpg`] : [`${nube.sesion.user.id}/audio_${b}.m4a`, `${nube.sesion.user.id}/audio_${b}.webm`];
    }).flat();
    if (rutas.length) await supa.storage.from("archivos").remove(rutas);
  } catch (e) {}
}
let _timerNube = null;
function programarSubida() {
  if (!supa || !nube.sesion || !st.inspId) return;
  clearTimeout(_timerNube);
  _timerNube = setTimeout(() => sincronizar(true), 4000);
}
let _sincronizando = false;
async function sincronizar(soloActual) {
  if (!supa || !nube.sesion || _sincronizando || !navigator.onLine) return;
  _sincronizando = true;
  ponNube("sync", "Sincronizando…");
  try {
    if (soloActual && st.inspId) {
      await subirInsp(st.inspId);
    } else {
      // Bajar: lo remoto nuevo o más reciente
      const { data: filas, error } = await supa.from("inspecciones").select("id, data, updated_at");
      if (error) throw new Error(error.message);
      let cambioIndex = false;
      for (const fila of filas || []) {
        const localRaw = await kvGet("insp:" + fila.id);
        const local = localRaw ? JSON.parse(localRaw) : null;
        const tsLocal = local && local._ts ? local._ts : "1970";
        if (!local || fila.updated_at > tsLocal) {
          const d = fila.data; d._ts = fila.updated_at;
          await kvSet("insp:" + fila.id, JSON.stringify(d));
          if (!st.index.find((x) => x.id === fila.id)) {
            st.index.push({ id: fila.id, nombre: d.edificio.nombre, informe: d.edificio.informe, fecha: d.edificio.fecha });
            cambioIndex = true;
          } else {
            const e = st.index.find((x) => x.id === fila.id);
            e.nombre = d.edificio.nombre; e.informe = d.edificio.informe; e.fecha = d.edificio.fecha;
            cambioIndex = true;
          }
        }
      }
      if (cambioIndex) { await kvSet("index", JSON.stringify(st.index)); if (st.pantalla.n === "lista") render(); }
      // Subir: todas las locales
      for (const e of st.index) await subirInsp(e.id);
    }
    ponNube("ok", "Sincronizado");
  } catch (e) {
    ponNube("error", e.message);
  }
  _sincronizando = false;
}
async function iniciarNube() {
  if (!supa) { ponNube("off", "Nube no configurada"); return; }
  try {
    const { data } = await supa.auth.getSession();
    nube.sesion = data && data.session;
  } catch (e) { nube.sesion = null; }
  if (nube.sesion) { ponNube("ok", "Sesión activa"); sincronizar(false); }
  else ponNube("sin-sesion", "Sin sesión");
  supa.auth.onAuthStateChange((ev, ses) => {
    const antes = !!nube.sesion;
    nube.sesion = ses;
    if (ses) { ponNube("ok", ""); if (!antes) { sincronizar(false); render(); } }
    else { ponNube("sin-sesion", ""); render(); }
  });
  window.addEventListener("online", () => sincronizar(false));
}

/* ================= IndexedDB ================= */
let _db = null;
function db() {
  if (_db) return Promise.resolve(_db);
  return new Promise((res, rej) => {
    const r = indexedDB.open("bsp-inspeccion", 1);
    r.onupgradeneeded = (e) => {
      const d = e.target.result;
      d.createObjectStore("kv");
      d.createObjectStore("blobs");
    };
    r.onsuccess = () => { _db = r.result; res(_db); };
    r.onerror = () => rej(r.error);
  });
}
function idb(store, modo, fn) {
  return db().then((d) => new Promise((res, rej) => {
    const tx = d.transaction(store, modo);
    const req = fn(tx.objectStore(store));
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  }));
}
const kvGet = (k) => idb("kv", "readonly", (s) => s.get(k));
const kvSet = (k, v) => idb("kv", "readwrite", (s) => s.put(v, k));
const kvDel = (k) => idb("kv", "readwrite", (s) => s.delete(k));
const blobGet = (k) => idb("blobs", "readonly", (s) => s.get(k));
const blobSet = (k, v) => idb("blobs", "readwrite", (s) => s.put(v, k));
const blobDel = (k) => idb("blobs", "readwrite", (s) => s.delete(k));

  };
}

        await kvSet("index", JSON.stringify(st.index));

      }
      ponEstado("Guardado ✓", false);
    } catch (err) {
      ponEstado("⚠ SIN GUARDAR", true);
    }
  }, 500);
}
function ponEstado(t, mal) {

}

/* ================= Imagen ================= */
function comprimir(file, maxDim = 1800, calidad = 0.8) {
  return new Promise((res, rej) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      let { width, height } = img;
      const esc = Math.min(1, maxDim / Math.max(width, height));
      width = Math.round(width * esc); height = Math.round(height * esc);
      const c = document.createElement("canvas");
      c.width = width; c.height = height;
      c.getContext("2d").drawImage(img, 0, 0, width, height);
      URL.revokeObjectURL(url);
      c.toBlob((b) => (b ? res(b) : rej(new Error("toBlob"))), "image/jpeg", calidad);
    };
    img.onerror = rej;
    img.src = url;
  });
}
async function urlFoto(pid) {
  if (st.urls[pid]) return st.urls[pid];
  let b = await blobGet("photo:" + pid);
  if (!b && supa && nube.sesion && navigator.onLine) b = await bajarBlob("photo", pid);
  if (!b) return null;
  st.urls[pid] = URL.createObjectURL(b);
  return st.urls[pid];
}

/* ================= Navegación / render ================= */
const $app = document.getElementById("app");
function nav(p) { st.pantalla = p; render(); window.scrollTo(0, 0); }
function esc(s) { return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/"/g, "&quot;"); }

document.getElementById("btnVolver").onclick = () => {
  const p = st.pantalla;
  if (p.n === "unidad") nav({ n: "nivel", nivelId: p.nivelId });
  else if (p.n === "nivel" || p.n === "export") nav({ n: "casa" });
  else if (p.n === "casa") nav({ n: "lista" });
  else if (p.n === "setup") nav(st.insp && st.insp.listo ? { n: "casa" } : { n: "lista" });
  else if (p.n === "ajustes") nav({ n: "lista" });
};

function render() {
  const p = st.pantalla;
  if (supa && !nube.sesion && !st.omitirLogin) {
    document.getElementById("btnVolver").style.display = "none";
    document.getElementById("hdrTitulo").textContent = "Iniciar sesión";
    return rLogin();

/* ================= Grabadora ================= */
let rec = null; // { mr, sr, chunks, texto, segs, timer, ctx }
function iniciarGrabacion(ctx, btn, liveEl) {
  navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
    const chunks = [];
    let mime = "";
    for (const m of ["audio/mp4", "audio/webm;codecs=opus", "audio/webm"])
      if (window.MediaRecorder && MediaRecorder.isTypeSupported(m)) { mime = m; break; }
    const mr = new MediaRecorder(stream, mime ? { mimeType: mime, audioBitsPerSecond: 48000 } : undefined);
    mr.ondataavailable = (e) => { if (e.data && e.data.size) chunks.push(e.data); };
    mr.onstop = async () => {
      stream.getTracks().forEach((t) => t.stop());
      const blob = new Blob(chunks, { type: mr.mimeType || "audio/mp4" });
      const voz = ctx.voz();
      if (blob.size > 0) {
        const aid = voz.audio || uid();
        await blobSet("audio:" + aid, blob);
        voz.audio = aid;
      }
      const nuevo = (rec && rec.texto || "").trim();
      if (nuevo) voz.texto = voz.texto ? voz.texto.trim() + "\n" + nuevo : nuevo;
      rec = null;
      guardar(); render();
    };
    let texto = "";
    let sr = null;
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR) {
      sr = new SR(); sr.lang = "es-VE"; sr.continuous = true; sr.interimResults = true;
      sr.onresult = (e) => {
        if (!rec) return;
        let interim = "";
        for (let i = e.resultIndex; i < e.results.length; i++) {
          if (e.results[i].isFinal) texto += e.results[i][0].transcript + " ";
          else interim += e.results[i][0].transcript;
        }
        rec.texto = texto;
        if (liveEl) liveEl.textContent = texto + interim;
      };
      sr.onend = () => { if (rec && rec.sr === sr) { try { sr.start(); } catch (e) {} } };
      try { sr.start(); } catch (e) { sr = null; }
    }
    if (liveEl && !sr) liveEl.textContent = "Grabando audio… (transcripción en vivo no disponible; dicta luego con el teclado en el campo de texto)";
    rec = { mr, sr, chunks, texto: "", segs: 0, ctx };
    mr.start(1000);
    rec.timer = setInterval(() => {
      rec.segs++;
      if (btn) btn.innerHTML = '<span class="punto"></span>Detener ' + Math.floor(rec.segs / 60) + ":" + String(rec.segs % 60).padStart(2, "0");
    }, 1000);
    if (btn) btn.innerHTML = '<span class="punto"></span>Detener 0:00';
  }).catch(() => alert("No se pudo acceder al micrófono. Ve a Ajustes del iPhone → Safari (o la app) → Micrófono y permite el acceso."));
}
function detenerGrabacion() {
  if (!rec) return;
  clearInterval(rec.timer);
  if (rec.sr) { const s = rec.sr; rec.sr = null; try { s.stop(); } catch (e) {} }
  if (rec.mr.state !== "inactive") rec.mr.stop();
}
function htmlGrabadora(idBase, etiqueta, voz) {
  return `
  <div class="grabadora" id="${idBase}">
    <div class="fila" style="align-items:center">
      <div class="etiq" style="margin:0;flex:1">${etiqueta}</div>
      <button class="rec" style="flex:0 0 auto" id="${idBase}Btn">🎙 ${voz.audio || voz.texto ? "Agregar grabación" : "Grabar resumen"}</button>
    </div>
    <div class="grab-live" id="${idBase}Live" style="display:none"></div>
    <div id="${idBase}Audio"></div>
    <textarea id="${idBase}Txt" rows="3" placeholder="Resumen (dicta con el 🎙 del teclado o escribe)…" style="margin-top:8px">${esc(voz.texto)}</textarea>
  </div>`;
}
function wireGrabadora(idBase, getVoz) {
  const btn = document.getElementById(idBase + "Btn");
  const live = document.getElementById(idBase + "Live");
  const txt = document.getElementById(idBase + "Txt");
  const audioDiv = document.getElementById(idBase + "Audio");
  txt.oninput = () => { getVoz().texto = txt.value; guardar(); };
  const voz = getVoz();
  if (voz.audio) {
    (async () => {
      let b = await blobGet("audio:" + voz.audio);
      if (!b && supa && nube.sesion && navigator.onLine) b = await bajarBlob("audio", voz.audio);
      if (!b) return;
      const u = URL.createObjectURL(b);
      audioDiv.innerHTML = `<div class="fila" style="margin-top:8px"><audio controls src="${u}"></audio>
        <button class="btn-rojo-linea" style="flex:0 0 auto;width:auto;padding:6px 10px;border-radius:8px;font-size:12px" id="${idBase}Del">Eliminar</button></div>`;
      document.getElementById(idBase + "Del").onclick = async () => {
        if (!confirm("¿Eliminar la grabación de audio? El texto se conserva.")) return;
        await blobDel("audio:" + getVoz().audio);
        getVoz().audio = null; guardar(); render();
      };
    })();
  }
  btn.onclick = () => {
    if (rec) { detenerGrabacion(); return; }
    live.style.display = "block"; live.textContent = "Escuchando…";
    iniciarGrabacion({ voz: getVoz }, btn, live);
  };
}

    guardar(); rNivel();

  $app.querySelectorAll("[data-unidad]").forEach((b) => (b.onclick = () => nav({ n: "unidad", nivelId: nv.id, unidadId: b.dataset.unidad })));
  wireGrabadora("gNivel", () => nv.voz);
}

/* ================= Pantalla: unidad ================= */
function rUnidad() {
  const nv = st.insp.niveles.find((x) => x.id === st.pantalla.nivelId);
  const apt = nv && nv.apts.find((a) => a.id === st.pantalla.unidadId);
  if (!apt) return nav({ n: "casa" });
  if (!st.insp.unidades[apt.id]) st.insp.unidades[apt.id] = unidadVacia();
  const u = st.insp.unidades[apt.id];
  const atcBtns = ATC.map((a) => `<button class="${ATC_CLS[a]} ${u.atc === a ? "on" : ""}" data-atc="${a}">${ATC_CORTO[a]}</button>`).join("");
  const fotos = (u.fotos || []).map((f, i) => `
    <div class="foto-card" data-fid="${f.id}">
      <img id="img_${f.id}" alt="Foto ${i + 1}" style="display:none" />
      <div class="cuerpo">
        <div class="fila" style="margin-bottom:8px">
          <span class="etiq" style="margin:0;flex:1">FOTO ${i + 1}</span>
          <button class="btn-gris" style="width:auto;padding:5px 9px;border-radius:8px;font-size:12px;${f.star ? "background:#fbbf24;border-color:#f59e0b;color:var(--ink);font-weight:700" : ""}" data-star="${f.id}">${f.star ? "★ En el informe" : "☆ Incluir en informe"}</button>
          <button class="btn-rojo-linea" style="width:auto;padding:5px 9px;border-radius:8px;font-size:12px" data-delfoto="${f.id}">Eliminar</button>
        </div>
        <textarea rows="2" placeholder="Descripción de lo observado…" data-desc="${f.id}">${esc(f.desc)}</textarea>
        <select data-dano="${f.id}" style="margin:8px 0">
          <option value="">Tipo de daño…</option>
          ${DANOS.map((dm) => `<option ${f.dano === dm ? "selected" : ""}>${dm}</option>`).join("")}
        </select>
        <div class="atc">${ATC.map((a) => `<button class="${ATC_CLS[a]} ${f.atc === a ? "on" : ""}" data-fatc="${f.id}|${a}">${ATC_CORTO[a]}</button>`).join("")}</div>
      </div>
    </div>`).join("");
  $app.innerHTML = `
    <div class="fila" style="margin-bottom:2px">
      <h2 style="flex:1" id="tituloApt">${esc(apt.nombre)}</h2>
      <button class="btn-gris" style="width:auto;border-radius:10px" id="bRenombrar">Renombrar</button>
    </div>
    <p class="sub">${esc(nv.nombre)}</p>
    <div class="etiq">Clasificación ATC-20 de esta zona</div>
    <div class="atc" style="margin-bottom:14px" id="atcUnidad">${atcBtns}</div>
    <input type="file" accept="image/*" capture="environment" id="fCam" style="display:none" />
    <input type="file" accept="image/*" multiple id="fGal" style="display:none" />
    <div class="grid2" style="margin-bottom:12px">
      <button class="btn btn-negro" id="bCam">📷 Tomar foto</button>
      <button class="btn btn-linea" id="bGal">🖼 De galería</button>
    </div>
    <p class="error" id="errFoto"></p>
    ${fotos}
    ${htmlGrabadora("gUnidad", "Resumen de voz · " + esc(apt.nombre), u.voz)}
    ${st.apiKey ? '<button class="btn btn-ambar" id="bIA" style="margin-bottom:10px">✨ Redactar resumen técnico con Claude</button>' : ""}
    <button class="btn btn-rojo-linea" id="bDelUnidad">Eliminar esta ${nv.comun ? "zona" : "unidad"}</button>`;
  // cargar imágenes
  (u.fotos || []).forEach(async (f) => {
    const url = await urlFoto(f.id);
    const im = document.getElementById("img_" + f.id);
    if (im && url) { im.src = url; im.style.display = "block"; }
  });
  document.getElementById("atcUnidad").querySelectorAll("button").forEach((bt) => (bt.onclick = () => {
    u.atc = u.atc === bt.dataset.atc ? "" : bt.dataset.atc; guardar(); rUnidad();
  }));
  const fCam = document.getElementById("fCam"), fGal = document.getElementById("fGal");
  document.getElementById("bCam").onclick = () => fCam.click();
  document.getElementById("bGal").onclick = () => fGal.click();
  const onArchivos = async (e) => {
    const files = Array.from(e.target.files || []);
    e.target.value = "";
    const err = document.getElementById("errFoto");
    for (const file of files) {
      try {
        const blob = await comprimir(file);
        const fid = uid();
        await blobSet("photo:" + fid, blob);
        u.fotos.push({ id: fid, desc: "", dano: "", atc: "", star: false });
      } catch (ex) {
        err.textContent = "No se pudo guardar una foto: " + (ex && ex.message ? ex.message : ex);
      }
    }
    guardar(); rUnidad();
  };
  fCam.onchange = onArchivos; fGal.onchange = onArchivos;
  $app.querySelectorAll("[data-desc]").forEach((t) => (t.oninput = () => {
    const f = u.fotos.find((x) => x.id === t.dataset.desc); if (f) { f.desc = t.value; guardar(); }
  }));
  $app.querySelectorAll("[data-dano]").forEach((s) => (s.onchange = () => {
    const f = u.fotos.find((x) => x.id === s.dataset.dano); if (f) { f.dano = s.value; guardar(); }
  }));
  $app.querySelectorAll("[data-fatc]").forEach((bt) => (bt.onclick = () => {
    const [fid, a] = bt.dataset.fatc.split("|");
    const f = u.fotos.find((x) => x.id === fid);
    if (f) { f.atc = f.atc === a ? "" : a; guardar(); rUnidad(); }
  }));
  $app.querySelectorAll("[data-star]").forEach((bt) => (bt.onclick = () => {
    const f = u.fotos.find((x) => x.id === bt.dataset.star);
    if (f) { f.star = !f.star; guardar(); rUnidad(); }
  }));
  $app.querySelectorAll("[data-delfoto]").forEach((bt) => (bt.onclick = async () => {
    if (!confirm("¿Eliminar esta foto?")) return;
    const fid = bt.dataset.delfoto;
    await blobDel("photo:" + fid);
    if (st.urls[fid]) { URL.revokeObjectURL(st.urls[fid]); delete st.urls[fid]; }
    u.fotos = u.fotos.filter((x) => x.id !== fid);
    guardar(); rUnidad();
  }));
  document.getElementById("bRenombrar").onclick = () => {
    const nuevo = prompt("Nuevo nombre de la unidad:", apt.nombre);
    if (nuevo && nuevo.trim()) { apt.nombre = nuevo.trim(); guardar(); rUnidad(); }
  };
  document.getElementById("bDelUnidad").onclick = async () => {
    if (!confirm(`¿Eliminar "${apt.nombre}" con sus fotos y grabaciones?`)) return;
    for (const f of u.fotos || []) await blobDel("photo:" + f.id);
    if (u.voz && u.voz.audio) await blobDel("audio:" + u.voz.audio);
    nv.apts = nv.apts.filter((x) => x.id !== apt.id);
    delete st.insp.unidades[apt.id];
    guardar(); nav({ n: "nivel", nivelId: nv.id });
  };
  wireGrabadora("gUnidad", () => u.voz);
  const bIA = document.getElementById("bIA");
  if (bIA) bIA.onclick = () => asistirIA(nv, apt, u, bIA);
}

/* ================= Exportación ================= */
function textoExport() {
  const d = st.insp, b = d.edificio;
  const L = [];
  const idx = [];
  let n = 0;
  L.push(`INSPECCIÓN POST-SÍSMICA DE CAMPO — BSP-2026-${b.informe || "___"}`);
  L.push(`Doblete Sísmico 24 de junio de 2026 · Mw 7,2 y Mw 7,5 · Yaracuy, Venezuela`);
  L.push(`Inspector: Ing. Eduardo Lubo · CIV N.° 115.692`);
  L.push("");
  L.push("A. DATOS DEL EDIFICIO");
  L.push(`Nombre: ${b.nombre || "-"}`);
  L.push(`Dirección: ${b.direccion || "-"}`);
  L.push(`Parroquia/Municipio/Estado: ${b.municipio || "-"}`);
  L.push(`Año de construcción: ${b.anio || "-"}`);
  L.push(`Sistema estructural: ${b.sistema || "-"}`);
  L.push(`Parcela: ${b.parcela || "-"} m² · Construcción: ${b.construccion || "-"} m²`);
  L.push(`Total unidades: ${b.unidades || "-"}`);
  L.push(`Fecha de inspección: ${b.fecha || "-"}`);
  if (b.notas) L.push(`Notas generales: ${b.notas}`);
  L.push("");
  L.push("B. HALLAZGOS POR NIVEL Y UNIDAD");
  for (const nv of d.niveles) {
    L.push("");
    L.push(`===== ${nv.nombre.toUpperCase()} =====`);
    for (const a of nv.apts) {
      const u = d.unidades[a.id];
      if (!unidadLista(u)) { L.push(`— ${a.nombre}: sin registro.`); continue; }
      L.push("");
      L.push(`>> ${a.nombre}${u.atc ? ` · Clasificación ATC-20: ${u.atc}` : ""}`);
      for (const f of u.fotos || []) {
        n++;
        idx.push({ n, id: f.id, zona: nv.nombre + " / " + a.nombre, desc: f.desc, star: !!f.star });
        L.push(`   Foto ${n}${f.star ? " [SELECCIONADA PARA EL INFORME]" : ""}: ${f.desc || "(sin descripción)"}${f.dano ? " · Daño: " + f.dano : ""}${f.atc ? " · ATC-20: " + f.atc : ""}`);
      }
      if (u.voz && u.voz.texto) L.push(`   Resumen de voz: ${u.voz.texto.replace(/\n/g, " ")}`);
    }
    if (nv.voz && nv.voz.texto) { L.push(""); L.push(`RESUMEN DEL NIVEL ${nv.nombre.toUpperCase()}: ${nv.voz.texto.replace(/\n/g, " ")}`); }
  }
  L.push("");
  L.push("C. ÍNDICE DE FOTOGRAFÍAS");
  for (const f of idx) L.push(`Foto ${f.n}${f.star ? " ★informe" : ""} · ${f.zona} · ${f.desc || "(sin descripción)"}`);
  const nStar = idx.filter((f) => f.star).length;
  L.push("");
  L.push(`Total de fotografías: ${n} (${nStar} seleccionadas para el registro fotográfico del informe).`);
  L.push("Fin del registro de campo. Generar informe profesional con la estructura estándar BSP 2026.");
  return { texto: L.join("\n"), idx };
}
function nombreFoto(f) {
  return `BSP-2026-${st.insp.edificio.informe || "X"}_foto_${String(f.n).padStart(2, "0")}.jpg`;
}
function rExport() {
  const { texto, idx } = textoExport();
  const starred = idx.filter((f) => f.star);
  const filas = idx.map((f) => `
    <div class="lista-foto">
      <img class="mini" id="mini_${f.id}" alt="" />
      <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">#${f.n}${f.star ? " ★" : ""} · ${esc(f.zona)}</span>
      <button class="btn-gris" style="width:auto;padding:5px 9px;border-radius:8px;font-size:12px" data-dl="${f.n}">Guardar</button>
    </div>`).join("");
  $app.innerHTML = `
    <h2>Exportar inspección</h2>
    <ol class="sub" style="padding-left:18px">
      <li>Copia el texto y pégalo en una conversación nueva del proyecto BSP 2026 en Claude.</li>
      <li>Comparte las fotos ★ a esa conversación (en tandas de máx. 20 por mensaje).</li>
      <li>Respalda el ZIP completo en Archivos/iCloud antes de borrar el edificio.</li>
    </ol>
    <button class="btn btn-negro" id="bCopiar">Copiar texto para Claude</button>
    <div class="grid2" style="margin-top:8px">
      <button class="btn btn-ambar" id="bShareStar">★ Compartir fotos del informe (${starred.length})</button>
      <button class="btn btn-linea" id="bZip">💾 ZIP completo (${idx.length} fotos)</button>
    </div>
    <p class="aviso" id="msgExp"></p>
    <details><summary>Ver texto exportado</summary>
      <textarea rows="14" readonly class="mono">${esc(texto)}</textarea></details>
    <div style="margin-top:12px"><div class="etiq">Fotos individuales</div>${filas || '<p class="sub">Sin fotos aún.</p>'}</div>`;
  idx.forEach(async (f) => {
    const url = await urlFoto(f.id);
    const im = document.getElementById("mini_" + f.id);
    if (im && url) im.src = url;
  });
  const msg = (t) => (document.getElementById("msgExp").textContent = t);
  document.getElementById("bCopiar").onclick = async () => {
    try { await navigator.clipboard.writeText(texto); msg("✓ Texto copiado. Pégalo en una conversación nueva del proyecto."); }
    catch (e) {
      const ta = document.createElement("textarea"); ta.value = texto; document.body.appendChild(ta);
      ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
      msg("✓ Texto copiado.");
    }
  };
  document.getElementById("bShareStar").onclick = async () => {
    if (!starred.length) return msg("No hay fotos marcadas con ★ todavía.");
    if (!navigator.canShare) return msg("Este navegador no permite compartir archivos; usa el ZIP.");
    const lote = 10;
    for (let i = 0; i < starred.length; i += lote) {
      const files = [];
      for (const f of starred.slice(i, i + lote)) {
        const b = await blobGet("photo:" + f.id);
        if (b) files.push(new File([b], nombreFoto(f), { type: "image/jpeg" }));
      }
      try { await navigator.share({ files }); } catch (e) { break; }
    }
    msg("Listo. Si son más de 10, se comparten por tandas.");
  };
  document.getElementById("bZip").onclick = async () => {
    msg("Armando ZIP…");
    const zip = new JSZip();
    zip.file("registro_campo.txt", texto);
    for (const f of idx) {
      const b = await blobGet("photo:" + f.id);
      if (b) zip.file(nombreFoto(f), b);
    }
    const blob = await zip.generateAsync({ type: "blob" });
    const file = new File([blob], `BSP-2026-${st.insp.edificio.informe || "X"}_completo.zip`, { type: "application/zip" });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try { await navigator.share({ files: [file] }); msg("ZIP compartido. Guárdalo en Archivos → iCloud Drive."); return; } catch (e) {}
    }
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = file.name; a.click();
    msg("ZIP descargado.");
  };
  $app.querySelectorAll("[data-dl]").forEach((bt) => (bt.onclick = async () => {
    const f = idx.find((x) => x.n === +bt.dataset.dl);
    const b = await blobGet("photo:" + f.id);
    if (!b) return;
    const file = new File([b], nombreFoto(f), { type: "image/jpeg" });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try { await navigator.share({ files: [file] }); return; } catch (e) {}
    }
    const a = document.createElement("a");
    a.href = URL.createObjectURL(b); a.download = file.name; a.click();
  }));
}

/* ================= Ajustes / API ================= */
function rAjustes() {
  const ses = nube.sesion;
  $app.innerHTML = `
    <h2>Ajustes</h2>
    <div class="tarjeta">
      <div class="etiq">☁ Cuenta en la nube (sincronización)</div>
      ${ses ? `
        <p class="aviso">Sesión activa: <b>${esc(ses.user.email)}</b>. Tus inspecciones se sincronizan automáticamente entre tus dispositivos.</p>
        <button class="btn btn-negro" id="bSync">Sincronizar ahora</button>
        <button class="btn btn-gris" id="bSalir" style="margin-top:8px">Cerrar sesión en este dispositivo</button>
      ` : `
        <label class="campo"><span>Correo</span><input id="inMail" type="email" autocomplete="username" placeholder="tu@correo.com" /></label>
        <label class="campo"><span>Contraseña</span><input id="inPass" type="password" autocomplete="current-password" /></label>
        <button class="btn btn-negro" id="bEntrar">Iniciar sesión</button>
      `}
      <p class="aviso" id="msgNube">${esc(nube.msg)}</p>
    </div>
    <p class="sub">Conexión opcional con Claude vía API para asistencia de redacción en campo.</p>
    <div class="tarjeta">
      <label class="campo"><span>Clave API de Anthropic (sk-ant-…)</span>
        <input id="inKey" type="password" value="${esc(st.apiKey)}" placeholder="sk-ant-api03-…" /></label>
      <p class="aviso">La clave se guarda solo en este teléfono. Se obtiene en console.anthropic.com (cuenta con crédito prepagado, se cobra por uso). Sin clave, la app funciona 100% igual; solo se desactiva el botón "✨ Redactar con Claude".</p>
      <button class="btn btn-negro" id="bGuardarKey">Guardar</button>
      <button class="btn btn-gris" id="bProbarKey" style="margin-top:8px">Probar conexión</button>
      <p class="aviso" id="msgKey"></p>
    </div>
    <div class="tarjeta">
      <div class="etiq">Almacenamiento del teléfono</div>
      <p class="aviso" id="msgAlm">Calculando…</p>
    </div>
    <p class="aviso">BSP Inspecciones Post-Sísmica 2026 · Ing. Eduardo Lubo · CIV N.° 115.692 · App de campo v2.0 (nube)</p>`;
  const mN = (t) => (document.getElementById("msgNube").textContent = t);
  if (ses) {
    document.getElementById("bSync").onclick = async () => { mN("Sincronizando…"); await sincronizar(false); mN(nube.estado === "ok" ? "✓ Sincronizado." : "✗ " + nube.msg); };
    document.getElementById("bSalir").onclick = async () => {
      if (!confirm("¿Cerrar sesión? Los datos locales se conservan; solo se detiene la sincronización.")) return;
      await supa.auth.signOut(); rAjustes();
    };
  } else {
    document.getElementById("bEntrar").onclick = async () => {
      mN("Entrando…");
      if (!supa) return mN("✗ Nube no configurada en esta versión.");
      const { error } = await supa.auth.signInWithPassword({
        email: document.getElementById("inMail").value.trim(),
        password: document.getElementById("inPass").value
      });
      if (error) mN("✗ " + error.message);
      else { mN("✓ Sesión iniciada."); rAjustes(); }
    };
  }
  document.getElementById("bGuardarKey").onclick = async () => {
    st.apiKey = document.getElementById("inKey").value.replace(/\s+/g, "");
    await kvSet("apikey", st.apiKey);
    document.getElementById("msgKey").textContent = "✓ Guardada.";
  };
  document.getElementById("bProbarKey").onclick = async () => {
    const m = document.getElementById("msgKey");
    st.apiKey = document.getElementById("inKey").value.replace(/\s+/g, "");
    await kvSet("apikey", st.apiKey);
    m.textContent = "Probando…";
    try {
      const r = await llamarClaude("Responde únicamente: OK", 20);
      m.textContent = r.includes("OK") ? "✓ Conexión con Claude funcionando." : "Respuesta inesperada: " + r.slice(0, 80);
    } catch (e) { m.textContent = "✗ " + e.message; }
  };
  if (navigator.storage && navigator.storage.estimate) {
    navigator.storage.estimate().then((est) => {
      const uso = (est.usage / 1048576).toFixed(1), tope = (est.quota / 1048576).toFixed(0);
      document.getElementById("msgAlm").textContent = `En uso: ${uso} MB de ~${tope} MB disponibles para la app.`;
    });
  }
}
async function llamarClaude(prompt, maxTokens) {
  if (!st.apiKey) throw new Error("Configura primero la clave API en Ajustes.");
  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": st.apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: maxTokens || 800,
      messages: [{ role: "user", content: prompt }]
    })
  });
  if (!resp.ok) {
    const t = await resp.text();
    throw new Error("API " + resp.status + ": " + t.slice(0, 120));
  }
  const data = await resp.json();
  return (data.content || []).filter((c) => c.type === "text").map((c) => c.text).join("\n");
}
async function asistirIA(nv, apt, u, btn) {
  btn.disabled = true; btn.textContent = "✨ Redactando…";
  try {
    const fotos = (u.fotos || []).map((f, i) => `Foto ${i + 1}: ${f.desc || "sin descripción"} (daño: ${f.dano || "?"}, ATC-20: ${f.atc || "?"})`).join("\n");
    const prompt = `Eres asistente de un ingeniero estructural en inspección post-sísmica ATC-20 en Venezuela (doblete sísmico 24/06/2026, Yaracuy). Redacta en español técnico y conciso (máximo 120 palabras, sin markdown, sin guiones largos) el resumen de hallazgos de la unidad "${apt.nombre}" (${nv.nombre}), clasificación ATC-20 de la unidad: ${u.atc || "sin asignar"}.
Observaciones de fotos:
${fotos || "(sin fotos)"}
Notas dictadas por el ingeniero: ${u.voz.texto || "(ninguna)"}
Responde solo con el párrafo del resumen, sin preámbulos.`;
    const r = await llamarClaude(prompt, 400);
    u.voz.texto = (u.voz.texto ? u.voz.texto.trim() + "\n\n[Redacción asistida]\n" : "") + r.trim();
    guardar(); rUnidad();
  } catch (e) {
    alert("No se pudo redactar: " + e.message);
    btn.disabled = false; btn.textContent = "✨ Redactar resumen técnico con Claude";
  }
}
