<script>
"use strict";
/* ================= Constantes ================= */
const VERSION = "2.7";
const ATC = ["INSPECCIONADO", "USO RESTRINGIDO", "NO HABITABLE"];
const ATC_CLS = { "INSPECCIONADO": "v", "USO RESTRINGIDO": "a", "NO HABITABLE": "r" };
const ATC_CORTO = { "INSPECCIONADO": "INSPECC.", "USO RESTRINGIDO": "USO RESTR.", "NO HABITABLE": "NO HABITABLE" };
const DANOS = ["Sin daño", "Mampostería menor", "Mampostería mayor", "Daño estructural", "Preexistente no sísmico"];
const SISTEMAS = [
  "Pórticos de concreto armado",

];
const ZONAS = ["Fachada principal","Fachada posterior","Fachada lateral izquierda","Fachada lateral derecha",
  "Columnas visibles","Vigas interiores visibles","Vigas perimetrales exteriores","Escalera principal",
  "Escalera de emergencia","Áreas comunes PB","Sótano / estacionamiento","Acceso al sótano",
  "Fosa del ascensor","Azotea: cuarto de máquinas","Azotea: tanque elevado","Azotea: muro perimetral"];
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

/* ================= Nube (Supabase) ================= */
const SUPA_URL = "https://tkqqjbuzrulqkzhdiqwq.supabase.co";
const SUPA_KEY = "sb_publishable_j6XrZIg5LwI9Fhp4ZG0jOQ_xdaJw7Qi";
let supa = null;
try { supa = window.supabase ? window.supabase.createClient(SUPA_URL, SUPA_KEY) : null; } catch (e) { supa = null; }
let nube = { sesion: null, estado: "off", msg: "" }; // off | sin-sesion | sync | ok | error
let _subidos = null; // {blobId: true} blobs ya en la nube
async function subidosSet() {
  if (_subidos) return _subidos;
  try { _subidos = JSON.parse((await kvGet("subidos")) || "{}"); } catch (e) { _subidos = {}; }
  return _subidos;
}
async function marcarSubido(id) {
  const s = await subidosSet(); s[id] = true; await kvSet("subidos", JSON.stringify(s));
}
function ponNube(estado, msg) {
  nube.estado = estado; nube.msg = msg || "";
  const el = document.getElementById("hdrNube");
  if (!el) return;
  el.textContent = estado === "ok" ? "☁✓" : estado === "sync" ? "☁…" : estado === "error" ? "☁!" : estado === "sin-sesion" ? "☁ entrar" : "";
  el.title = msg || "";
}
function extBlob(b) { return (b && b.type || "").includes("webm") ? "webm" : (b && b.type || "").includes("mp4") ? "m4a" : "jpg"; }
function rutaNube(tipo, id, blob) {
  const u = nube.sesion.user.id;
  return `${u}/${tipo}_${id}.${tipo === "photo" ? "jpg" : extBlob(blob)}`;
}
async function subirBlob(tipo, id) {
  const s = await subidosSet();
  if (s[tipo + ":" + id]) return true;
  const blob = await blobGet(tipo + ":" + id);
  if (!blob) return true;
  const { error } = await supa.storage.from("archivos").upload(rutaNube(tipo, id, blob), blob, { upsert: true, contentType: blob.type || undefined });
  if (error) throw new Error("subida " + tipo + ": " + error.message);
  await marcarSubido(tipo + ":" + id);
  return true;
}
async function bajarBlob(tipo, id) {
  // intenta las extensiones conocidas
  for (const ext of tipo === "photo" ? ["jpg"] : ["m4a", "webm"]) {
    const ruta = `${nube.sesion.user.id}/${tipo}_${id}.${ext}`;
    const { data, error } = await supa.storage.from("archivos").download(ruta);
    if (!error && data) {
      await blobSet(tipo + ":" + id, data);
      await marcarSubido(tipo + ":" + id);
      return data;
    }
  }
  return null;
}
function blobsDeInsp(d) {
  const ids = [];
  for (const u of Object.values(d.unidades || {})) {
    for (const f of u.fotos || []) ids.push(["photo", f.id]);
    if (u.voz && u.voz.audio) ids.push(["audio", u.voz.audio]);
  }
  for (const nv of d.niveles || []) if (nv.voz && nv.voz.audio) ids.push(["audio", nv.voz.audio]);
  return ids;
}
async function subirInsp(id) {
  const raw = await kvGet("insp:" + id);
  if (!raw) return;
  const d = JSON.parse(raw);
  const ts = d._ts || new Date().toISOString();
  const { error } = await supa.from("inspecciones").upsert({ id, user_id: nube.sesion.user.id, data: d, updated_at: ts });
  if (error) throw new Error("datos: " + error.message);
  for (const [tipo, bid] of blobsDeInsp(d)) await subirBlob(tipo, bid);
}
async function borrarInspNube(id, d) {
  if (!supa || !nube.sesion) return;
  try {
    await supa.from("inspecciones").delete().eq("id", id);
    const rutas = blobsDeInsp(d).map(([t, b]) => {
      // borra ambas posibles extensiones de audio
      return t === "photo" ? [`${nube.sesion.user.id}/photo_${b}.jpg`] : [`${nube.sesion.user.id}/audio_${b}.m4a`, `${nube.sesion.user.id}/audio_${b}.webm`];
    }).flat();
    if (rutas.length) await supa.storage.from("archivos").remove(rutas);
  } catch (e) {}
}
let _timerNube = null;
function programarSubida() {
  if (!supa || !nube.sesion || !st.inspId) return;
  clearTimeout(_timerNube);
  _timerNube = setTimeout(() => sincronizar(true), 4000);
}
let _sincronizando = false;
async function sincronizar(soloActual) {
  if (!supa || !nube.sesion || _sincronizando || !navigator.onLine) return;
  _sincronizando = true;
  ponNube("sync", "Sincronizando…");
  try {
    if (soloActual && st.inspId) {
      await subirInsp(st.inspId);
    } else {
      // Bajar: lo remoto nuevo o más reciente
      const { data: filas, error } = await supa.from("inspecciones").select("id, data, updated_at");
      if (error) throw new Error(error.message);
      let cambioIndex = false;
      for (const fila of filas || []) {
        const localRaw = await kvGet("insp:" + fila.id);
        const local = localRaw ? JSON.parse(localRaw) : null;
        const tsLocal = local && local._ts ? local._ts : "1970";
        if (!local || fila.updated_at > tsLocal) {
          const d = fila.data; d._ts = fila.updated_at;
          await kvSet("insp:" + fila.id, JSON.stringify(d));
          if (!st.index.find((x) => x.id === fila.id)) {
            st.index.push({ id: fila.id, nombre: d.edificio.nombre, informe: d.edificio.informe, fecha: d.edificio.fecha });
            cambioIndex = true;
          } else {
            const e = st.index.find((x) => x.id === fila.id);
            e.nombre = d.edificio.nombre; e.informe = d.edificio.informe; e.fecha = d.edificio.fecha;
            cambioIndex = true;
          }
        }
      }
      if (cambioIndex) { await kvSet("index", JSON.stringify(st.index)); if (st.pantalla.n === "lista") render(); }
      // Subir: todas las locales
      for (const e of st.index) await subirInsp(e.id);
    }
    ponNube("ok", "Sincronizado");
  } catch (e) {
    ponNube("error", e.message);
  }
  _sincronizando = false;
}
async function iniciarNube() {
  if (!supa) { ponNube("off", "Nube no configurada"); return; }
  try {
    const { data } = await supa.auth.getSession();
    nube.sesion = data && data.session;
  } catch (e) { nube.sesion = null; }
  if (nube.sesion) { ponNube("ok", "Sesión activa"); sincronizar(false); }
  else ponNube("sin-sesion", "Sin sesión");
  supa.auth.onAuthStateChange((ev, ses) => {
    const antes = !!nube.sesion;
    nube.sesion = ses;
    if (ses) { ponNube("ok", ""); if (!antes) { sincronizar(false); render(); } }
    else { ponNube("sin-sesion", ""); render(); }
  });
  window.addEventListener("online", () => sincronizar(false));
}

/* ================= IndexedDB ================= */
let _db = null;
function db() {
  if (_db) return Promise.resolve(_db);
  return new Promise((res, rej) => {
    const r = indexedDB.open("bsp-inspeccion", 1);
    r.onupgradeneeded = (e) => {
      const d = e.target.result;
      d.createObjectStore("kv");
      d.createObjectStore("blobs");
    };
    r.onsuccess = () => { _db = r.result; res(_db); };
    r.onerror = () => rej(r.error);
  });
}
function idb(store, modo, fn) {
  return db().then((d) => new Promise((res, rej) => {
    const tx = d.transaction(store, modo);
    const req = fn(tx.objectStore(store));
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  }));
}
const kvGet = (k) => idb("kv", "readonly", (s) => s.get(k));
const kvSet = (k, v) => idb("kv", "readwrite", (s) => s.put(v, k));
const kvDel = (k) => idb("kv", "readwrite", (s) => s.delete(k));
const blobGet = (k) => idb("blobs", "readonly", (s) => s.get(k));
const blobSet = (k, v) => idb("blobs", "readwrite", (s) => s.put(v, k));
const blobDel = (k) => idb("blobs", "readwrite", (s) => s.delete(k));

/* ================= Estado ================= */

  pantalla: { n: "lista" },
  index: [],
  inspId: null,
  insp: null,
  apiKey: "",
  urls: {},          // pid -> objectURL
  grabando: null,    // contexto de grabación activa

};

      parcela: "", construccion: "", unidades: "", pisos: "", notas: "", atcGlobal: "",

      fecha: ahora.toISOString().slice(0, 10),
      horaInicio: ahora.toTimeString().slice(0, 5) },

  };
}

  apts: apts.map((n) => ({ id: uid(), nombre: n })), voz: { audio: null, texto: "" } });
const unidadVacia = () => ({ fotos: [], voz: { audio: null, texto: "" }, atc: "", estado: "" });

function guardar() {
  ponEstado("Guardando…", false);
  clearTimeout(_timerGuardar);
  _timerGuardar = setTimeout(async () => {

      if (st.inspId && st.insp) {
        st.insp._ts = new Date().toISOString();

        if (e) { e.nombre = st.insp.edificio.nombre; e.informe = st.insp.edificio.informe; e.fecha = st.insp.edificio.fecha; }
        await kvSet("index", JSON.stringify(st.index));
        programarSubida();
      }
      ponEstado("Guardado ✓", false);
    } catch (err) {
      ponEstado("⚠ SIN GUARDAR", true);
    }
  }, 500);

  const el = document.getElementById("hdrEstado");
  el.textContent = t; el.className = "estado" + (mal ? " mal" : "");

/* ================= Imagen ================= */
function comprimir(file, maxDim = 1800, calidad = 0.8) {
  return new Promise((res, rej) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      let { width, height } = img;
      const esc = Math.min(1, maxDim / Math.max(width, height));
      width = Math.round(width * esc); height = Math.round(height * esc);
      const c = document.createElement("canvas");
      c.width = width; c.height = height;
      c.getContext("2d").drawImage(img, 0, 0, width, height);
      URL.revokeObjectURL(url);
      c.toBlob((b) => (b ? res(b) : rej(new Error("toBlob"))), "image/jpeg", calidad);
    };
    img.onerror = rej;
    img.src = url;
  });
}
async function urlFoto(pid) {
  if (st.urls[pid]) return st.urls[pid];
  let b = await blobGet("photo:" + pid);
  if (!b && supa && nube.sesion && navigator.onLine) b = await bajarBlob("photo", pid);
  if (!b) return null;
  st.urls[pid] = URL.createObjectURL(b);
  return st.urls[pid];
}

/* ================= Navegación / render ================= */
const $app = document.getElementById("app");
function nav(p) { st.pantalla = p; render(); window.scrollTo(0, 0); }
function esc(s) { return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/"/g, "&quot;"); }

document.getElementById("btnVolver").onclick = () => {
  const p = st.pantalla;
  if (p.n === "unidad") nav({ n: "nivel", nivelId: p.nivelId });
  else if (p.n === "nivel" || p.n === "export") nav({ n: "casa" });
  else if (p.n === "casa") nav({ n: "lista" });
  else if (p.n === "setup") nav(st.insp && st.insp.listo ? { n: "casa" } : { n: "lista" });
  else if (p.n === "ajustes") nav({ n: "lista" });
};

function render() {
  const p = st.pantalla;
  if (supa && !nube.sesion && !st.omitirLogin) {
    document.getElementById("btnVolver").style.display = "none";
    document.getElementById("hdrTitulo").textContent = "Iniciar sesión";
    return rLogin();
  }
  document.getElementById("btnVolver").style.display = p.n === "lista" ? "none" : "block";
  const t = document.getElementById("hdrTitulo");
  if (p.n === "lista") t.textContent = "Mis inspecciones";
  else if (p.n === "ajustes") t.textContent = "Ajustes";
  else t.textContent = (st.insp && st.insp.edificio.nombre ? st.insp.edificio.nombre : "Nueva inspección") +
    (st.insp && st.insp.edificio.informe ? " · BSP-2026-" + st.insp.edificio.informe : "");
  if (p.n === "lista") rLista();
  else if (p.n === "setup") rSetup();
  else if (p.n === "casa") rCasa();
  else if (p.n === "nivel") rNivel();
  else if (p.n === "unidad") rUnidad();
  else if (p.n === "export") rExport();
  else if (p.n === "ajustes") rAjustes();
}

    const { error } = await supa.auth.signInWithPassword({
      email: document.getElementById("lgMail").value.trim(),

    });

function rLista() {
  const items = st.index.map((e) => `
    <div class="item" style="padding:10px 13px">
      <button class="cuerpo" style="background:none;border:none;text-align:left;font-family:inherit;padding:0" data-abrir="${e.id}">

      </button>
      <button class="btn-rojo-linea" style="width:auto;padding:7px 10px;border-radius:8px;font-size:12px" data-borrar="${e.id}">Eliminar</button>
    </div>`).join("");
  $app.innerHTML = `
    <h2>Mis inspecciones</h2>
    <p class="sub">Cada edificio es una inspección. Al terminar: exporta, respalda el ZIP y elimínala.</p>
    ${items || '<p class="sub" style="text-align:center;padding:24px 0">No hay inspecciones activas. Crea la primera.</p>'}
    <button class="btn btn-negro" id="bNueva" style="margin-top:8px">+ Nueva inspección</button>
    <hr class="sep" />
    <button class="btn btn-gris" id="bAjustes">⚙️ Ajustes y conexión con Claude</button>`;
  document.getElementById("bNueva").onclick = async () => {
    const id = uid();
    st.insp = nuevaInsp(); st.inspId = id;
    st.index.push({ id, nombre: "", informe: "", fecha: st.insp.edificio.fecha });
    await kvSet("insp:" + id, JSON.stringify(st.insp));
    await kvSet("index", JSON.stringify(st.index));
    nav({ n: "setup" });
  };
  document.getElementById("bAjustes").onclick = () => nav({ n: "ajustes" });
  $app.querySelectorAll("[data-abrir]").forEach((b) => (b.onclick = async () => {
    const id = b.dataset.abrir;
    const raw = await kvGet("insp:" + id);
    if (!raw) return;
    st.insp = JSON.parse(raw); st.inspId = id; st.urls = {};
    nav(st.insp.listo ? { n: "casa" } : { n: "setup" });
  }));
  $app.querySelectorAll("[data-borrar]").forEach((b) => (b.onclick = async () => {
    const id = b.dataset.borrar;
    const e = st.index.find((x) => x.id === id);
    if (!confirm(`¿Eliminar "${(e && e.nombre) || "esta inspección"}" con todas sus fotos y audios? Asegúrate de haber exportado y respaldado primero.`)) return;
    const raw = await kvGet("insp:" + id);
    if (raw) {
      const d = JSON.parse(raw);
      for (const u of Object.values(d.unidades || {})) {
        for (const f of u.fotos || []) await blobDel("photo:" + f.id);
        if (u.voz && u.voz.audio) await blobDel("audio:" + u.voz.audio);
      }
      for (const nv of d.niveles || []) if (nv.voz && nv.voz.audio) await blobDel("audio:" + nv.voz.audio);
      borrarInspNube(id, d);
    }
    await kvDel("insp:" + id);
    st.index = st.index.filter((x) => x.id !== id);
    await kvSet("index", JSON.stringify(st.index));
    if (st.inspId === id) { st.inspId = null; st.insp = null; }
    render();
  }));
}

const unidadLista = (u) => !!(u && ((u.fotos && u.fotos.length) || (u.voz && (u.voz.texto || u.voz.audio)) || u.atc || u.estado));

/* ================= Pantalla: casa (niveles) ================= */
function rCasa() {
  const d = st.insp;
  const totalFotos = Object.values(d.unidades).reduce((s, u) => s + (u.fotos ? u.fotos.length : 0), 0);
  const items = d.niveles.map((nv) => {
    const total = nv.apts.length;
    const hechas = nv.apts.filter((a) => unidadLista(d.unidades[a.id])).length;
    const ok = total > 0 && hechas === total;
    return `
    <button class="item" data-nivel="${nv.id}">
      <div class="prog ${ok ? "ok" : ""}">${ok ? "✓" : hechas + "/" + total}</div>
      <div class="cuerpo">
        <div class="nombre">${esc(nv.nombre)}</div>
        <div class="detalle">${nv.comun ? "Zonas del formulario de campo" : total + " unidades"}${nv.voz && (nv.voz.texto || nv.voz.audio) ? " · 🎙" : ""}</div>
      </div>
      <div class="flecha">›</div>
    </button>`;
  }).join("");
  $app.innerHTML = `
    <div class="fila" style="margin-bottom:10px">
      <h2 style="flex:1">Niveles</h2>
      <button class="btn-gris" style="width:auto;border-radius:10px" id="bEditar">Editar datos</button>
    </div>
    ${items}
    <div class="tarjeta" style="padding:12px;margin-top:10px">
      <div class="etiq">Agregar nivel</div>
      <div class="pildoras" style="margin-bottom:8px">
        <button id="bAddSotano">+ Sótano</button>
        <button id="bAddPiso">+ Piso</button>
        <button id="bAddPH">+ Pent-house (PH)</button>
        <button id="bAddOtro">+ Otro nivel</button>
      </div>
      <p class="aviso" style="margin:0">Los sótanos y el PH se crean sin unidades; agrégalas dentro con "+ Agregar". Para eliminar o renombrar un nivel, entra en él.</p>
    </div>
    <button class="btn btn-negro" id="bExport" style="margin-top:10px">Exportar inspección (${totalFotos} fotos)</button>
    <button class="btn btn-rojo-linea" id="bBorrarInsp" style="margin-top:8px">Eliminar esta inspección (al terminar)</button>`;
  document.getElementById("bEditar").onclick = () => nav({ n: "setup" });
  document.getElementById("bExport").onclick = () => nav({ n: "export" });
  const agregarNivel = (prefijo, insertarAlInicio) => {
    const n = d.niveles.filter((x) => x.nombre.startsWith(prefijo)).length;
    let nombre;
    if (prefijo === "Sótano") nombre = "Sótano " + (n + 1);
    else if (prefijo === "Piso") {
      const maxPiso = d.niveles.filter((x) => /^Piso \d+$/.test(x.nombre)).map((x) => parseInt(x.nombre.slice(5))).reduce((a, b) => Math.max(a, b), 0);
      nombre = "Piso " + (maxPiso + 1);
    } else if (prefijo === "PH") nombre = n === 0 ? "Pent-house (PH)" : "PH " + (n + 1);
    else { const nm = prompt("Nombre del nivel:", ""); if (!nm || !nm.trim()) return; nombre = nm.trim(); }
    const nivel = mkNivel(nombre, []);
    // Insertar antes de "Zonas comunes" para mantenerlas al final
    const idxComun = d.niveles.findIndex((x) => x.comun);
    if (insertarAlInicio) d.niveles.unshift(nivel);
    else if (idxComun >= 0) d.niveles.splice(idxComun, 0, nivel);
    else d.niveles.push(nivel);
    guardar(); rCasa();
  };
  document.getElementById("bAddSotano").onclick = () => agregarNivel("Sótano", true);
  document.getElementById("bAddPiso").onclick = () => agregarNivel("Piso", false);
  document.getElementById("bAddPH").onclick = () => agregarNivel("PH", false);
  document.getElementById("bAddOtro").onclick = () => agregarNivel("Otro", false);
  document.getElementById("bBorrarInsp").onclick = () => {
    if (!confirm("¿Exportaste el texto y respaldaste el ZIP de fotos? Esta acción borra todo el edificio y no se puede deshacer.")) return;
    const id = st.inspId;
    (async () => {
      const d = st.insp;
      for (const u of Object.values(st.insp.unidades)) {
        for (const f of u.fotos || []) await blobDel("photo:" + f.id);
        if (u.voz && u.voz.audio) await blobDel("audio:" + u.voz.audio);
      }
      for (const nv of st.insp.niveles) if (nv.voz && nv.voz.audio) await blobDel("audio:" + nv.voz.audio);
      borrarInspNube(id, d);
      await kvDel("insp:" + id);
      st.index = st.index.filter((x) => x.id !== id);
      await kvSet("index", JSON.stringify(st.index));
      st.insp = null; st.inspId = null;
      nav({ n: "lista" });
    })();
  };
  $app.querySelectorAll("[data-nivel]").forEach((b) => (b.onclick = () => nav({ n: "nivel", nivelId: b.dataset.nivel })));
}

/* ================= Grabadora ================= */
let rec = null; // { mr, sr, chunks, texto, segs, timer, ctx }
function iniciarGrabacion(ctx, btn, liveEl) {
  navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
    const chunks = [];
    let mime = "";
    for (const m of ["audio/mp4", "audio/webm;codecs=opus", "audio/webm"])
      if (window.MediaRecorder && MediaRecorder.isTypeSupported(m)) { mime = m; break; }
    const mr = new MediaRecorder(stream, mime ? { mimeType: mime, audioBitsPerSecond: 48000 } : undefined);
    mr.ondataavailable = (e) => { if (e.data && e.data.size) chunks.push(e.data); };
    mr.onstop = async () => {
      stream.getTracks().forEach((t) => t.stop());
      const blob = new Blob(chunks, { type: mr.mimeType || "audio/mp4" });
      const voz = ctx.voz();
      if (blob.size > 0) {
        const aid = voz.audio || uid();
        await blobSet("audio:" + aid, blob);
        voz.audio = aid;
      }
      const nuevo = (rec && rec.texto || "").trim();
      if (nuevo) voz.texto = voz.texto ? voz.texto.trim() + "\n" + nuevo : nuevo;
      rec = null;
      guardar(); render();
    };
    let texto = "";
    let sr = null;
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR) {
      sr = new SR(); sr.lang = "es-VE"; sr.continuous = true; sr.interimResults = true;
      sr.onresult = (e) => {
        if (!rec) return;
        let interim = "";
        for (let i = e.resultIndex; i < e.results.length; i++) {
          if (e.results[i].isFinal) texto += e.results[i][0].transcript + " ";
          else interim += e.results[i][0].transcript;
        }
        rec.texto = texto;
        if (liveEl) liveEl.textContent = texto + interim;
      };
      sr.onend = () => { if (rec && rec.sr === sr) { try { sr.start(); } catch (e) {} } };
      try { sr.start(); } catch (e) { sr = null; }
    }
    if (liveEl && !sr) liveEl.textContent = "Grabando audio… (transcripción en vivo no disponible; dicta luego con el teclado en el campo de texto)";
    rec = { mr, sr, chunks, texto: "", segs: 0, ctx };
    mr.start(1000);
    rec.timer = setInterval(() => {
      rec.segs++;
      if (btn) btn.innerHTML = '<span class="punto"></span>Detener ' + Math.floor(rec.segs / 60) + ":" + String(rec.segs % 60).padStart(2, "0");
    }, 1000);
    if (btn) btn.innerHTML = '<span class="punto"></span>Detener 0:00';
  }).catch(() => alert("No se pudo acceder al micrófono. Ve a Ajustes del iPhone → Safari (o la app) → Micrófono y permite el acceso."));
}
function detenerGrabacion() {
  if (!rec) return;
  clearInterval(rec.timer);
  if (rec.sr) { const s = rec.sr; rec.sr = null; try { s.stop(); } catch (e) {} }
  if (rec.mr.state !== "inactive") rec.mr.stop();
}

    </div>
    <div style="flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:0 8px">

    </div>
    <div style="display:flex;gap:10px;align-items:center;padding:12px 14px">
      <div style="display:flex;gap:8px" id="edColores">
        <button data-c="#e11d48" style="width:34px;height:34px;border-radius:999px;background:#e11d48;border:3px solid #fff"></button>
        <button data-c="#facc15" style="width:34px;height:34px;border-radius:999px;background:#facc15;border:3px solid transparent"></button>
        <button data-c="#22c55e" style="width:34px;height:34px;border-radius:999px;background:#22c55e;border:3px solid transparent"></button>
        <button data-c="#ffffff" style="width:34px;height:34px;border-radius:999px;background:#fff;border:3px solid transparent"></button>
      </div>
      <button id="edGuardar" style="flex:1;background:#fff;color:#111827;border:none;border-radius:10px;padding:12px;font-weight:800;font-size:15px">Guardar anotaciones</button>
    </div>`;
  document.body.appendChild(ov);
  const canvas = ov.querySelector("#edCanvas");
  canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
  const ctx = canvas.getContext("2d");
  let color = "#e11d48";
  const trazos = [];
  let actual = null;
  const grosor = Math.max(4, Math.round(canvas.width / 220));
  function redibujar() {
    ctx.drawImage(img, 0, 0);
    for (const t of trazos) {
      ctx.strokeStyle = t.color; ctx.lineWidth = grosor; ctx.lineCap = "round"; ctx.lineJoin = "round";
      ctx.beginPath();
      t.pts.forEach((p, i) => (i ? ctx.lineTo(p[0], p[1]) : ctx.moveTo(p[0], p[1])));
      ctx.stroke();
    }
  }
  redibujar();
  const pos = (e) => {
    const r = canvas.getBoundingClientRect();
    return [((e.clientX - r.left) / r.width) * canvas.width, ((e.clientY - r.top) / r.height) * canvas.height];
  };
  canvas.onpointerdown = (e) => { e.preventDefault(); canvas.setPointerCapture(e.pointerId); actual = { color, pts: [pos(e)] }; trazos.push(actual); };
  canvas.onpointermove = (e) => { if (!actual) return; e.preventDefault(); actual.pts.push(pos(e)); redibujar(); };
  canvas.onpointerup = () => { actual = null; };
  ov.querySelector("#edColores").querySelectorAll("button").forEach((bt) => (bt.onclick = () => {
    color = bt.dataset.c;
    ov.querySelector("#edColores").querySelectorAll("button").forEach((x) => (x.style.borderColor = x === bt ? "#fff" : "transparent"));
    if (color === "#ffffff") bt.style.borderColor = "#facc15";
  }));
  ov.querySelector("#edDeshacer").onclick = () => { trazos.pop(); redibujar(); };
  const cerrar = () => { URL.revokeObjectURL(url); ov.remove(); };
  ov.querySelector("#edCerrar").onclick = cerrar;
  ov.querySelector("#edGuardar").onclick = () => {
    canvas.toBlob(async (nuevo) => {
      if (nuevo) {
        await blobSet("photo:" + fid, nuevo);
        if (st.urls[fid]) { URL.revokeObjectURL(st.urls[fid]); delete st.urls[fid]; }
        const s = await subidosSet();
        delete s["photo:" + fid];
        await kvSet("subidos", JSON.stringify(s));
        guardar();
      }
      cerrar(); render();
    }, "image/jpeg", 0.85);
  };
}

/* ================= Sello de fotos exportadas ================= */
async function sellarFoto(blob, linea1, linea2) {
  try {
    const img = new Image();
    const url = URL.createObjectURL(blob);
    await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = url; });
    const c = document.createElement("canvas");
    c.width = img.naturalWidth; c.height = img.naturalHeight;
    const ctx = c.getContext("2d");
    ctx.drawImage(img, 0, 0);
    const fs = Math.max(16, Math.round(c.width / 55));
    const alto = fs * 2.9;
    ctx.fillStyle = "rgba(17,24,39,0.62)";
    ctx.fillRect(0, c.height - alto, c.width, alto);
    ctx.fillStyle = "#ffffff";
    ctx.font = `600 ${fs}px system-ui, sans-serif`;
    ctx.fillText(linea1, fs * 0.7, c.height - alto + fs * 1.15);
    ctx.font = `400 ${fs * 0.85}px system-ui, sans-serif`;
    ctx.fillText(linea2, fs * 0.7, c.height - alto + fs * 2.35);
    URL.revokeObjectURL(url);
    return await new Promise((res) => c.toBlob((b) => res(b || blob), "image/jpeg", 0.85));
  } catch (e) { return blob; }
}

  L.push("");
  L.push("A. DATOS DEL EDIFICIO");
  L.push(`Nombre: ${b.nombre || "-"}`);
  L.push(`Dirección: ${b.direccion || "-"}`);
  L.push(`Parroquia: ${b.parroquia || "-"} · Municipio: ${b.municipio || "-"} · Estado: ${b.estado || "-"}`);
  if (b.gps) L.push(`Coordenadas GPS: ${b.gps.lat.toFixed(6)}, ${b.gps.lon.toFixed(6)} (precisión ±${Math.round(b.gps.acc)} m)`);
  L.push(`Año de construcción: ${b.anio || "-"}`);
  L.push(`N.° de pisos: ${b.pisos || "-"}`);
  L.push(`Sistema estructural: ${b.sistema || "-"}`);
  L.push(`Parcela: ${b.parcela || "-"} m² · Construcción: ${b.construccion || "-"} m²`);
  L.push(`Total unidades: ${b.unidades || "-"}`);
  L.push(`Fecha de inspección: ${b.fecha || "-"} · Hora de inicio: ${b.horaInicio || "-"}`);
  L.push(`CLASIFICACIÓN ATC-20 GLOBAL DEL EDIFICIO: ${b.atcGlobal || "PENDIENTE DE ASIGNAR"}`);
  if (b.notas) L.push(`Notas generales: ${b.notas}`);
  if (b.antecedentes || b.conserje) {
    L.push("");
    L.push("A2. ANTECEDENTES E INSPECCIONES PREVIAS");
    if (b.antecedentes) L.push(`Inspecciones previas de otros organismos: ${b.antecedentes.replace(/\n/g, " | ")}`);
    if (b.conserje) L.push(`Observaciones del conserje / residentes: ${b.conserje.replace(/\n/g, " | ")}`);
  }
  L.push("");
  L.push("B. HALLAZGOS POR NIVEL Y UNIDAD");
  for (const nv of d.niveles) {
    L.push("");
    L.push(`===== ${nv.nombre.toUpperCase()} =====`);
    for (const a of nv.apts) {
      const u = d.unidades[a.id];
      if (u && u.estado === "no-accedida") { L.push(`— ${a.nombre}: NO ACCEDIDA / fuera del alcance de esta inspección.`); continue; }
      if (u && u.estado === "sin-hallazgos" && !(u.fotos || []).length && !(u.voz && u.voz.texto)) {
        L.push(`— ${a.nombre}: inspeccionada SIN HALLAZGOS relevantes${u.atc ? ` · ATC-20: ${u.atc}` : ""}.`);
        continue;
      }
      if (!unidadLista(u)) { L.push(`— ${a.nombre}: sin registro (estado no indicado por el inspector).`); continue; }
      L.push("");
      L.push(`>> ${a.nombre}${u.atc ? ` · Clasificación ATC-20: ${u.atc}` : ""}`);
      for (const f of u.fotos || []) {
        n++;
        idx.push({ n, id: f.id, zona: nv.nombre + " / " + a.nombre, desc: f.desc, star: !!f.star });
        L.push(`   Foto ${n}${f.star ? " [SELECCIONADA PARA EL INFORME]" : ""}: ${f.desc || "(sin descripción)"}${f.dano ? " · Daño: " + f.dano : ""}${f.atc ? " · ATC-20: " + f.atc : ""}`);
      }
      if (u.voz && u.voz.texto) L.push(`   Resumen de voz: ${u.voz.texto.replace(/\n/g, " ")}`);
    }
    if (nv.voz && nv.voz.texto) { L.push(""); L.push(`RESUMEN DEL NIVEL ${nv.nombre.toUpperCase()}: ${nv.voz.texto.replace(/\n/g, " ")}`); }
  }
  L.push("");
  L.push("C. ÍNDICE DE FOTOGRAFÍAS");
  for (const f of idx) L.push(`Foto ${f.n}${f.star ? " ★informe" : ""} · ${f.zona} · ${f.desc || "(sin descripción)"}`);
  const nStar = idx.filter((f) => f.star).length;
  L.push("");
  L.push(`Total de fotografías: ${n} (${nStar} seleccionadas para el registro fotográfico del informe).`);
  L.push("Fin del registro de campo. Generar informe profesional con la estructura estándar BSP 2026.");
  return { texto: L.join("\n"), idx };
}

/* ================= Resumen PDF de campo ================= */
async function generarResumenPDF() {
  const d = st.insp, b = d.edificio;
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ unit: "mm", format: "letter" });
  const W = pdf.internal.pageSize.getWidth();
  const M = 18;
  let y = 16;
  // Cabecera
  pdf.setFillColor(17, 24, 39);
  pdf.rect(0, 0, W, 26, "F");
  pdf.setTextColor(255, 255, 255);
  pdf.setFont("helvetica", "bold"); pdf.setFontSize(13);
  pdf.text("BSP · Building Safety Program", M, 11);
  pdf.setFont("helvetica", "normal"); pdf.setFontSize(9);
  pdf.text("Resumen de campo · Inspección post-sísmica · Doblete 24/06/2026 (Mw 7,2 y 7,5, Yaracuy)", M, 18);
  y = 34;
  pdf.setTextColor(17, 24, 39);
  pdf.setFont("helvetica", "bold"); pdf.setFontSize(15);
  pdf.text(`${b.nombre || "Edificio"} · Informe BSP-2026-${b.informe || "___"}`, M, y); y += 7;
  pdf.setFont("helvetica", "normal"); pdf.setFontSize(10);
  const dir = [b.direccion, b.parroquia, b.municipio, b.estado].filter(Boolean).join(", ");
  if (dir) { pdf.text(pdf.splitTextToSize("Dirección: " + dir, W - 2 * M), M, y); y += 5.5 * pdf.splitTextToSize("Dirección: " + dir, W - 2 * M).length; }
  pdf.text(`Fecha: ${b.fecha || "-"} · Hora de inicio: ${b.horaInicio || "-"} · Año de construcción: ${b.anio || "-"} · Pisos: ${b.pisos || "-"}`, M, y); y += 5.5;
  if (b.sistema) { pdf.text("Sistema estructural: " + b.sistema, M, y); y += 5.5; }
  if (b.gps) { pdf.text(`GPS: ${b.gps.lat.toFixed(6)}, ${b.gps.lon.toFixed(6)}`, M, y); y += 5.5; }
  y += 3;
  // Clasificación global
  const colores = { "INSPECCIONADO": [21, 128, 61], "USO RESTRINGIDO": [180, 83, 9], "NO HABITABLE": [185, 28, 28] };
  const cg = b.atcGlobal || "PENDIENTE";
  const col = colores[cg] || [107, 114, 128];
  pdf.setFillColor(col[0], col[1], col[2]);
  pdf.roundedRect(M, y, W - 2 * M, 16, 2, 2, "F");
  pdf.setTextColor(255, 255, 255);
  pdf.setFont("helvetica", "bold"); pdf.setFontSize(13);
  pdf.text(`CLASIFICACIÓN ATC-20: ${cg}`, W / 2, y + 10, { align: "center" });
  y += 24;
  // Hallazgos principales
  pdf.setTextColor(17, 24, 39);
  pdf.setFont("helvetica", "bold"); pdf.setFontSize(11);
  pdf.text("Hallazgos principales", M, y); y += 6;
  pdf.setFont("helvetica", "normal"); pdf.setFontSize(9.5);
  let lineas = 0;
  for (const nv of d.niveles) {
    for (const a of nv.apts) {
      const u = d.unidades[a.id];
      if (!u || !unidadLista(u) || u.estado === "no-accedida") continue;
      if (u.estado === "sin-hallazgos" && !(u.fotos || []).length) continue;
      const danos = (u.fotos || []).map((f) => f.dano).filter(Boolean);
      const linea = `• ${nv.nombre} / ${a.nombre}${u.atc ? ` [${u.atc}]` : ""}${danos.length ? ": " + [...new Set(danos)].join(", ") : ""}`;
      const wrapped = pdf.splitTextToSize(linea, W - 2 * M);
      if (y + wrapped.length * 4.6 > 235 || lineas > 24) { pdf.text("… (detalle completo en el informe formal)", M, y); y += 5; break; }
      pdf.text(wrapped, M, y); y += wrapped.length * 4.6 + 1;
      lineas++;
    }
  }
  const noAcc = [];
  for (const nv of d.niveles) for (const a of nv.apts) {
    const u = d.unidades[a.id];
    if (u && u.estado === "no-accedida") noAcc.push(a.nombre);
  }
  if (noAcc.length) {
    y += 2;
    const t = pdf.splitTextToSize("Zonas no accedidas: " + noAcc.join(", "), W - 2 * M);
    pdf.setFont("helvetica", "italic");
    pdf.text(t, M, y); y += t.length * 4.6;
    pdf.setFont("helvetica", "normal");
  }
  let totF = 0, totS = 0;
  for (const u of Object.values(d.unidades)) { totF += (u.fotos || []).length; totS += (u.fotos || []).filter((f) => f.star).length; }
  y += 3;
  pdf.text(`Registro fotográfico: ${totF} fotografías (${totS} seleccionadas para el informe).`, M, y); y += 8;
  // Pie
  pdf.setDrawColor(200); pdf.line(M, 246, W - M, 246);
  pdf.setFontSize(9); pdf.setTextColor(70, 80, 95);
  pdf.text("Este es un resumen preliminar de campo. El informe formal de inspección BSP se encuentra en elaboración", M, 252);
  pdf.text("y prevalece sobre este documento.", M, 257);
  pdf.setFont("helvetica", "bold"); pdf.setTextColor(17, 24, 39);
  pdf.text("Ing. Eduardo Lubo · CIV N.° 115.692 · Colegio de Ingenieros de Venezuela", M, 265);
  const blob = pdf.output("blob");
  return new File([blob], `BSP-2026-${b.informe || "X"}_resumen_campo.pdf`, { type: "application/pdf" });
}

async function llamarClaude(prompt, maxTokens) {
  if (!st.apiKey) throw new Error("Configura primero la clave API en Ajustes.");
  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": st.apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: maxTokens || 800,
      messages: [{ role: "user", content: prompt }]
    })
  });
  if (!resp.ok) {
    const t = await resp.text();
    throw new Error("API " + resp.status + ": " + t.slice(0, 120));
  }
  const data = await resp.json();
  return (data.content || []).filter((c) => c.type === "text").map((c) => c.text).join("\n");
}
async function asistirIA(nv, apt, u, btn) {

  try {
    const fotos = (u.fotos || []).map((f, i) => `Foto ${i + 1}: ${f.desc || "sin descripción"} (daño: ${f.dano || "?"}, ATC-20: ${f.atc || "?"})`).join("\n");
    const prompt = `Eres asistente de un ingeniero estructural en inspección post-sísmica ATC-20 en Venezuela (doblete sísmico 24/06/2026, Yaracuy). Redacta en español técnico y conciso (máximo 120 palabras, sin markdown, sin guiones largos) el resumen de hallazgos de la unidad "${apt.nombre}" (${nv.nombre}), clasificación ATC-20 de la unidad: ${u.atc || "sin asignar"}.
Observaciones de fotos:
${fotos || "(sin fotos)"}
Notas dictadas por el ingeniero: ${u.voz.texto || "(ninguna)"}
Responde solo con el párrafo del resumen, sin preámbulos.`;
    const r = await llamarClaude(prompt, 400);
    u.voz.texto = (u.voz.texto ? u.voz.texto.trim() + "\n\n[Redacción asistida]\n" : "") + r.trim();
    guardar(); rUnidad();
  } catch (e) {
    alert("No se pudo redactar: " + e.message);
    btn.disabled = false; btn.textContent = "✨ Redactar resumen técnico con Claude";
  }
}

/* ================= Inicio ================= */
(async function init() {
  try {
    if (navigator.storage && navigator.storage.persist) navigator.storage.persist();
    const idxRaw = await kvGet("index");
    if (idxRaw) st.index = JSON.parse(idxRaw);
    const k = await kvGet("apikey");
    if (k) st.apiKey = k;
    ponEstado("Guardado ✓", false);
  } catch (e) {
    ponEstado("⚠ ALMACÉN NO DISPONIBLE", true);
  }
  await iniciarNube();
  render();
  document.getElementById("hdrNube").onclick = () => nav({ n: "ajustes" });
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").then((reg) => reg.update()).catch(() => {});
    let recargado = false;
    navigator.serviceWorker.addEventListener("controllerchange", () => {
      if (recargado) return;
      recargado = true;
      location.reload();
    });
  }
})();
</script>
